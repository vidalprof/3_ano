<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Aulas — E.B.M Vidal Ramos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <style>
    :root {
      --bg: #f4f6fc;
      --card: #ffffff;
      --ink: #2b2d42;
      --muted: #7a7f9a;
      --brand: #6d5efc;
      --brand-2: #9b8cff;
      --accent: #17b6a0;
      --border: #e8eaf4;
      --danger: #ef5b6f;
      --ok: #17b6a0;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(64, 66, 120, 0.10);
      --shadow-sm: 0 4px 14px rgba(64, 66, 120, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }

    /* ---------- Cabeçalho (hero) ---------- */
    .hero {
      position: relative;
      background: var(--brand);
      background: linear-gradient(135deg, #6d5efc 0%, #9b8cff 55%, #17b6a0 140%);
      color: #fff;
      padding: 40px 20px 70px;
      text-align: center;
      border-radius: 0 0 32px 32px;
      box-shadow: var(--shadow);
    }
    .hero .logo {
      width: 72px; height: 72px; line-height: 72px;
      margin: 0 auto 14px;
      background: rgba(255,255,255,0.18);
      border-radius: 22px;
      font-size: 34px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
    }
    .hero h1 { margin: 0; font-size: 1.7rem; font-weight: 700; letter-spacing: -0.3px; }
    .hero p { margin: 6px 0 0; opacity: 0.92; font-size: 1rem; }
    .lock-btn {
      position: absolute; top: 18px; right: 18px;
      width: 42px; height: 42px; border-radius: 14px;
      background: rgba(255,255,255,0.18); border: none; color: #fff;
      font-size: 18px; cursor: pointer; transition: background .15s;
    }
    .lock-btn:hover { background: rgba(255,255,255,0.30); }

    /* ---------- Layout ---------- */
    .wrap { max-width: 980px; margin: -44px auto 60px; padding: 0 16px; position: relative; z-index: 2; }

    /* Barra do administrador */
    .admin-bar {
      display: none; flex-wrap: wrap; align-items: center;
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 12px 16px; margin-bottom: 22px;
    }
    .admin-bar.on { display: flex; }
    .admin-bar .tag {
      background: rgba(109,94,252,0.12); color: var(--brand);
      font-weight: 700; font-size: .85rem; padding: 6px 12px; border-radius: 20px; margin-right: 8px;
    }
    .admin-bar .spacer { flex: 1 1 auto; min-width: 8px; }
    .admin-bar .btn { margin: 4px 0 4px 8px; }

    /* ---------- Layout mestre-detalhe (turmas à esquerda, links à direita) ---------- */
    .layout { display: flex; flex-wrap: wrap; margin: 0 -10px; align-items: flex-start; }
    .col-side { flex: 1 1 240px; margin: 10px; }
    .col-main { flex: 2 1 420px; margin: 10px; min-width: 0; }

    .sidebar {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
      border: 1px solid var(--border); padding: 12px;
    }
    .side-title {
      font-size: .72rem; font-weight: 800; letter-spacing: 1px; color: var(--muted);
      text-transform: uppercase; padding: 6px 8px 10px;
    }
    .turma-item {
      display: flex; align-items: center; padding: 12px 12px; border-radius: 13px;
      cursor: pointer; margin-bottom: 4px; transition: background .15s;
    }
    .turma-item:hover { background: #f4f6fc; }
    .turma-item.active { background: rgba(109,94,252,0.12); }
    .turma-item.active .nome { color: var(--brand); font-weight: 700; }
    .turma-item .dot { width: 11px; height: 11px; border-radius: 50%; margin-right: 11px; flex: 0 0 auto; box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
    .turma-item .nome { flex: 1 1 auto; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .turma-item .n { font-size: .74rem; font-weight: 700; color: var(--muted); background: #f1f2f9; padding: 2px 8px; border-radius: 20px; flex: 0 0 auto; }
    .turma-item.active .n { background: rgba(109,94,252,0.18); color: var(--brand); }
    .side-add { width: 100%; margin-top: 8px; }

    .panel {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
      border: 1px solid var(--border); overflow: hidden;
    }
    .panel-top { height: 6px; background: var(--brand); }
    .panel-head { display: flex; align-items: center; padding: 18px 20px 8px; }
    .panel-head h2 { margin: 0; font-size: 1.25rem; flex: 1 1 auto; letter-spacing: -0.2px; overflow: hidden; text-overflow: ellipsis; }
    .panel-head .count { color: var(--muted); font-size: .78rem; font-weight: 700; background: #f1f2f9; padding: 3px 9px; border-radius: 20px; margin-left: 8px; white-space: nowrap; }
    .panel-body { padding: 4px 20px 20px; }

    /* Links */
    .link-item { display: flex; align-items: center; margin: 9px 0; }
    a.link-btn {
      flex: 1 1 auto; display: flex; align-items: center;
      padding: 12px 14px; background: #f8f9fd; border: 1px solid var(--border);
      border-radius: 14px; text-decoration: none; color: var(--ink); font-weight: 600;
      transition: background .15s, border-color .15s, transform .15s; min-width: 0;
    }
    a.link-btn:hover { background: #fff; border-color: var(--brand-2); transform: translateX(2px); }
    a.link-btn .ico { font-size: 20px; margin-right: 12px; flex: 0 0 auto; }
    a.link-btn .txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    a.link-btn .tipo {
      margin-left: auto; padding-left: 10px; font-size: .68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .5px; flex: 0 0 auto;
    }
    .tipo.aula { color: #0e9d8a; }
    .tipo.atividade { color: #d97706; }
    .tipo.material { color: #8b5cf6; }
    .tipo.outro { color: #64748b; }

    .empty { text-align: center; color: var(--muted); padding: 30px 12px; }
    .empty-big {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
      padding: 50px 20px; text-align: center; color: var(--muted);
    }

    /* Botões */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 16px; border: none; border-radius: 12px; cursor: pointer;
      font-size: .92rem; font-weight: 700; font-family: inherit;
      background: var(--brand); color: #fff; transition: filter .15s, background .15s;
    }
    .btn:hover { filter: brightness(1.06); }
    .btn.ghost { background: #f1f2f9; color: var(--brand); }
    .btn.ghost:hover { background: #e7e9f6; filter: none; }
    .btn.ok { background: var(--ok); }
    .btn.small { padding: 7px 12px; font-size: .82rem; }
    .icon-btn {
      background: transparent; border: none; cursor: pointer; font-size: 15px; color: var(--muted);
      padding: 6px; border-radius: 9px; line-height: 1;
    }
    .icon-btn:hover { background: #f1f2f9; color: var(--ink); }
    .icon-btn.del:hover { color: var(--danger); background: #fdeef0; }
    .edit-controls { display: flex; align-items: center; }
    .turma-actions { display: flex; flex-wrap: wrap; margin-top: 12px; }
    .turma-actions .btn { margin: 4px 8px 0 0; }

    /* Modal */
    .overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(43, 45, 66, 0.55); display: none; z-index: 50;
      padding: 16px; text-align: center;
    }
    .overlay:before { content: ""; display: inline-block; height: 100%; vertical-align: middle; }
    .overlay.show { display: block; }
    .modal {
      display: inline-block; vertical-align: middle; text-align: left; width: 100%; max-width: 480px;
      background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
      padding: 24px; max-height: 88vh; overflow: auto;
    }
    .modal h3 { margin: 0 0 16px; font-size: 1.2rem; }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-weight: 700; margin-bottom: 6px; font-size: .88rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: 12px;
      font-size: .95rem; font-family: inherit; color: var(--ink); background: #fbfbfe;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--brand-2); background: #fff;
    }
    .field textarea { min-height: 130px; resize: vertical; }
    .field .hint { color: var(--muted); font-size: .8rem; margin-top: 6px; }
    .modal-actions { text-align: right; margin-top: 20px; }
    .modal-actions .btn { margin-left: 8px; }
    .color-row { display: flex; align-items: center; }
    .color-row input[type=color] { width: 52px; height: 44px; padding: 3px; margin-right: 10px; flex: 0 0 auto; }

    .toast {
      position: fixed; left: 50%; bottom: 24px; margin-left: -140px; width: 280px;
      background: var(--ink); color: #fff; padding: 13px 18px; border-radius: 12px;
      box-shadow: var(--shadow); z-index: 100; opacity: 0; transition: opacity .3s;
      text-align: center; font-weight: 600; font-size: .92rem;
    }
    .toast.show { opacity: 1; }
    .toast.ok { background: var(--ok); }
    .toast.err { background: var(--danger); }

    .footer { text-align: center; color: var(--muted); font-size: .82rem; margin-top: 34px; }

    @media (max-width: 520px) {
      .hero h1 { font-size: 1.4rem; }
      .admin-bar .spacer { display: none; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <button class="lock-btn" id="lockBtn" title="Área do professor" onclick="onLockClick()">🔒</button>
    <div class="logo" id="logo">📚</div>
    <h1 id="siteTitulo">Carregando...</h1>
    <p id="siteSubtitulo"></p>
  </div>

  <div class="wrap">
    <div class="admin-bar" id="adminBar">
      <span class="tag">✏️ Modo professor</span>
      <span class="spacer"></span>
      <button class="btn small ghost" onclick="openHeaderEdit()">Editar título</button>
      <button class="btn small" onclick="addTurma()">+ Nova turma</button>
      <button class="btn small ok" id="btnPublicar" onclick="publicar()">⬇️ Publicar</button>
      <span class="tag" id="cloudBadge" style="display:none;background:rgba(23,182,160,0.15);color:var(--ok);margin-left:8px;">☁️ Salva automático</span>
      <button class="btn small ghost" onclick="logout()">Sair</button>
    </div>

    <div id="turmas"></div>

    <div class="footer">E.B.M Vidal Ramos • Central de aulas e atividades</div>
  </div>

  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
  <div class="toast" id="toast"></div>

  <!-- SDK do Firebase (opcional). Se não carregar, o site usa o modo local automaticamente. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    /* =========================================================
       CONFIGURAÇÃO
       =========================================================

       (A) NUVEM EM TEMPO REAL (Firebase) — RECOMENDADO
       ---------------------------------------------------------
       Preencha FIREBASE_CONFIG com os dados do seu projeto Firebase
       e PROF_EMAIL com o e-mail do professor cadastrado no
       Authentication. Com isso, tudo que você editar aparece NA HORA
       para os alunos, em qualquer aparelho. Passo a passo no
       arquivo GUIA-FIREBASE.md.

       Enquanto FIREBASE_CONFIG estiver null, o site funciona em
       MODO LOCAL (salva no seu navegador; para os alunos verem use
       o botão Publicar). */
    var FIREBASE_CONFIG = {
      apiKey: "AIzaSyA9yzsYXgE7nUSQYEXW0vXlmGzETQqq-F0",
      authDomain: "central-de-aulas-20e45.firebaseapp.com",
      databaseURL: "https://central-de-aulas-20e45-default-rtdb.firebaseio.com",
      projectId: "central-de-aulas-20e45",
      storageBucket: "central-de-aulas-20e45.firebasestorage.app",
      messagingSenderId: "1098538878591",
      appId: "1:1098538878591:web:406bf9588267bb000be14a"
    };
    /* Exemplo (cole o seu no lugar do null acima):
    var FIREBASE_CONFIG = {
      apiKey: "AIza...",
      authDomain: "seu-projeto.firebaseapp.com",
      databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com",
      projectId: "seu-projeto"
    };
    */
    var PROF_EMAIL = "professor@central.com";   // usuário criado no Firebase Authentication

    /* (B) MODO LOCAL — senha usada só quando a nuvem NÃO está configurada. */
    var SENHA_ADMIN = "vidal2026";

    var TIPOS = [
      { valor: "aula", label: "Aula", ico: "🎬" },
      { valor: "atividade", label: "Atividade", ico: "📝" },
      { valor: "material", label: "Material", ico: "📄" },
      { valor: "outro", label: "Outro", ico: "🔗" }
    ];
    var DRAFT_KEY = "organizador_links_draft";

    var state = { titulo: "Central de Aulas", subtitulo: "", turmas: [] };
    var admin = false;
    var sel = 0;
    var cloud = false, dbRef = null, cloudHasData = false;

    function uid() { return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7); }
    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]; }); }
    function icoDoTipo(t) { for (var i = 0; i < TIPOS.length; i++) if (TIPOS[i].valor === t) return TIPOS[i].ico; return "🔗"; }
    function ehTipo(t) { for (var i = 0; i < TIPOS.length; i++) if (TIPOS[i].valor === t) return true; return false; }
    function saveDraft() { try { localStorage.setItem(DRAFT_KEY, JSON.stringify(state)); } catch (e) {} }

    /* Estado limpo (sem campos internos) para salvar/exportar */
    function cleanState() {
      var limpo = { titulo: state.titulo, subtitulo: state.subtitulo, turmas: [] };
      for (var i = 0; i < (state.turmas || []).length; i++) {
        var t = state.turmas[i], nl = [];
        for (var j = 0; j < (t.links || []).length; j++) {
          var l = t.links[j];
          nl.push({ id: l.id, titulo: l.titulo, url: l.url, tipo: l.tipo });
        }
        limpo.turmas.push({ id: t.id, nome: t.nome, cor: t.cor, links: nl });
      }
      return limpo;
    }

    /* Salva a alteração: na nuvem (todos veem na hora) ou local */
    function persist() {
      if (cloud && dbRef) {
        dbRef.set(cleanState()).then(function () {}, function () { toast("Erro ao salvar na nuvem", "err"); });
      } else {
        saveDraft();
      }
    }

    /* Inicializa a nuvem (Firebase). Retorna true se ativada. */
    function initCloud() {
      if (!FIREBASE_CONFIG || typeof firebase === "undefined") return false;
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        dbRef = firebase.database().ref("portal");
        cloud = true;
        dbRef.on("value", function (snap) {
          var data = snap.val();
          if (data && data.turmas) { cloudHasData = true; state = data; render(); }
          else { cloudHasData = false; }
        });
        firebase.auth().onAuthStateChanged(function (user) {
          admin = !!user; render();
          if (user && !cloudHasData && state.turmas && state.turmas.length) persist();
        });
        return true;
      } catch (e) { cloud = false; return false; }
    }

    function fetchDataJson(cb) {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "data.json?v=" + Date.now(), true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;
        if (xhr.status >= 200 && xhr.status < 300) { try { cb(JSON.parse(xhr.responseText)); } catch (e) { cb(null); } }
        else cb(null);
      };
      xhr.send();
    }

    function toast(msg, kind) {
      var t = document.getElementById("toast");
      t.textContent = msg; t.className = "toast show " + (kind || "ok");
      setTimeout(function () { t.className = "toast"; }, 3000);
    }

    function carregar() {
      /* Modo NUVEM: os dados vêm do Firebase em tempo real. */
      if (initCloud()) {
        fetchDataJson(function (data) {
          if (data && !cloudHasData && (!state.turmas || !state.turmas.length)) { state = data; render(); }
        });
        return;
      }
      /* Modo LOCAL: rascunho no navegador + data.json publicado. */
      var draft = null;
      try { draft = localStorage.getItem(DRAFT_KEY); } catch (e) {}
      if (draft) { try { state = JSON.parse(draft); render(); } catch (e) { try { localStorage.removeItem(DRAFT_KEY); } catch (e2) {} draft = null; } }
      fetchDataJson(function (data) {
        if (data) { if (!draft) { state = data; render(); } }
        else if (!draft) {
          document.getElementById("siteTitulo").textContent = "Não foi possível carregar os links";
          document.getElementById("siteSubtitulo").textContent = "Abra o site pelo endereço publicado.";
        }
      });
    }

    function render() {
      document.getElementById("siteTitulo").textContent = state.titulo || "";
      document.getElementById("siteSubtitulo").textContent = state.subtitulo || "";
      document.getElementById("adminBar").className = "admin-bar" + (admin ? " on" : "");
      document.getElementById("lockBtn").textContent = admin ? "🔓" : "🔒";
      var bp = document.getElementById("btnPublicar"); if (bp) bp.style.display = cloud ? "none" : "";
      var cb = document.getElementById("cloudBadge"); if (cb) cb.style.display = cloud ? "" : "none";

      var cont = document.getElementById("turmas");
      cont.innerHTML = "";

      if (!state.turmas || state.turmas.length === 0) {
        cont.innerHTML = '<div class="empty-big">Nenhuma turma cadastrada ainda.' +
          (admin ? '<br><br><button class="btn" onclick="addTurma()">+ Criar primeira turma</button>' : '') + '</div>';
        return;
      }
      if (sel < 0 || sel >= state.turmas.length) sel = 0;

      /* ----- Coluna da esquerda: lista de turmas ----- */
      var side = '<div class="col-side"><div class="sidebar"><div class="side-title">Turmas</div>';
      for (var ti = 0; ti < state.turmas.length; ti++) {
        var t = state.turmas[ti];
        var c = t.cor || "#6d5efc";
        side += '<div class="turma-item' + (ti === sel ? " active" : "") + '" onclick="selectTurma(' + ti + ')">' +
          '<span class="dot" style="background:' + esc(c) + '"></span>' +
          '<span class="nome">' + esc(t.nome) + '</span>' +
          (admin ? '<span class="edit-controls" onclick="event.stopPropagation()">' +
            '<button class="icon-btn" title="Editar" onclick="editTurma(' + ti + ')">✏️</button>' +
            '<button class="icon-btn" title="Subir" onclick="moveTurma(' + ti + ',-1)">▲</button>' +
            '<button class="icon-btn" title="Descer" onclick="moveTurma(' + ti + ',1)">▼</button>' +
            '<button class="icon-btn del" title="Remover" onclick="delTurma(' + ti + ')">🗑️</button>' +
          '</span>' : '<span class="n">' + (t.links || []).length + '</span>') +
        '</div>';
      }
      if (admin) side += '<button class="btn small side-add" onclick="addTurma()">+ Nova turma</button>';
      side += '</div></div>';

      /* ----- Coluna da direita: links da turma selecionada ----- */
      var turma = state.turmas[sel];
      var cor = turma.cor || "#6d5efc";
      var links = turma.links || [];
      var linksHtml = "";
      for (var li = 0; li < links.length; li++) {
        var lk = links[li];
        var tipoClass = ehTipo(lk.tipo) ? lk.tipo : "outro";
        linksHtml += '<div class="link-item">' +
          '<a class="link-btn" href="' + esc(lk.url) + '" target="_blank" rel="noopener">' +
            '<span class="ico">' + icoDoTipo(lk.tipo) + '</span>' +
            '<span class="txt">' + esc(lk.titulo) + '</span>' +
            '<span class="tipo ' + tipoClass + '">' + esc(lk.tipo || "outro") + '</span>' +
          '</a>' +
          (admin ? '<span class="edit-controls">' +
            '<button class="icon-btn" title="Editar" onclick="editLink(' + sel + ',' + li + ')">✏️</button>' +
            '<button class="icon-btn del" title="Remover" onclick="delLink(' + sel + ',' + li + ')">🗑️</button>' +
          '</span>' : '') +
        '</div>';
      }
      if (admin) {
        linksHtml += '<div class="turma-actions">' +
          '<button class="btn small" onclick="addLink(' + sel + ')">+ Link</button>' +
          '<button class="btn small ghost" onclick="addVariosLinks(' + sel + ')">+ Vários de uma vez</button>' +
        '</div>';
      } else if (links.length === 0) {
        linksHtml = '<p class="empty">Sem links nesta turma ainda.</p>';
      }

      var main = '<div class="col-main"><div class="panel" id="painelTurma">' +
        '<div class="panel-top" style="background:' + esc(cor) + '"></div>' +
        '<div class="panel-head"><h2>' + esc(turma.nome) + '</h2>' +
          '<span class="count">' + links.length + ' link(s)</span>' +
        '</div>' +
        '<div class="panel-body">' + linksHtml + '</div>' +
      '</div></div>';

      cont.innerHTML = '<div class="layout">' + side + main + '</div>';
    }

    function selectTurma(ti) {
      sel = ti; render();
      if (window.innerWidth < 700) {
        var p = document.getElementById("painelTurma");
        if (p && p.scrollIntoView) p.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }
    function moveTurma(ti, dir) {
      var j = ti + dir;
      if (j < 0 || j >= state.turmas.length) return;
      var t = state.turmas.splice(ti, 1)[0];
      state.turmas.splice(j, 0, t);
      persist(); render();
    }

    /* Login */
    function onLockClick() {
      if (admin) { logout(); return; }
      openModal(
        "<h3>🔒 Área do professor</h3>" +
        '<div class="field"><label>Senha</label><input type="password" id="mSenha" onkeydown="if(event.key===\'Enter\')doLogin()"></div>' +
        '<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="doLogin()">Entrar</button></div>'
      );
      setTimeout(function () { var e = document.getElementById("mSenha"); if (e) e.focus(); }, 50);
    }
    function doLogin() {
      var v = document.getElementById("mSenha").value;
      if (cloud) {
        firebase.auth().signInWithEmailAndPassword(PROF_EMAIL, v).then(
          function () { closeModal(); toast("Modo professor ativado"); },
          function () { toast("Senha incorreta", "err"); }
        );
      } else {
        if (v === SENHA_ADMIN) { admin = true; closeModal(); render(); toast("Modo professor ativado"); }
        else { toast("Senha incorreta", "err"); }
      }
    }
    function logout() {
      if (cloud && firebase.auth().currentUser) { firebase.auth().signOut(); toast("Você saiu do modo professor"); }
      else { admin = false; render(); toast("Você saiu do modo professor"); }
    }

    /* Cabeçalho */
    function openHeaderEdit() {
      openModal(
        "<h3>Editar título do site</h3>" +
        '<div class="field"><label>Título</label><input id="mTit" value="' + esc(state.titulo) + '"></div>' +
        '<div class="field"><label>Subtítulo</label><input id="mSub" value="' + esc(state.subtitulo) + '"></div>' +
        '<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveHeader()">Salvar</button></div>'
      );
    }
    function saveHeader() {
      state.titulo = document.getElementById("mTit").value.replace(/^\s+|\s+$/g, "") || state.titulo;
      state.subtitulo = document.getElementById("mSub").value.replace(/^\s+|\s+$/g, "");
      persist(); closeModal(); render();
    }

    /* Turmas */
    function addTurma() { editTurmaForm(null); }
    function editTurma(ti) { editTurmaForm(ti); }
    function editTurmaForm(ti) {
      var t = ti == null ? { nome: "", cor: "#6d5efc" } : state.turmas[ti];
      openModal(
        "<h3>" + (ti == null ? "Nova turma" : "Editar turma") + "</h3>" +
        '<div class="field"><label>Nome da turma</label><input id="mNome" value="' + esc(t.nome) + '" placeholder="Ex: 6º Ano A"></div>' +
        '<div class="field"><label>Cor</label><div class="color-row"><input type="color" id="mCor" value="' + esc(t.cor || "#6d5efc") + '"><span class="hint">Faixa colorida no topo do cartão</span></div></div>' +
        '<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveTurma(' + (ti == null ? "null" : ti) + ')">Salvar</button></div>'
      );
      setTimeout(function () { var e = document.getElementById("mNome"); if (e) e.focus(); }, 50);
    }
    function saveTurma(ti) {
      var nome = document.getElementById("mNome").value.replace(/^\s+|\s+$/g, "");
      var cor = document.getElementById("mCor").value;
      if (!nome) { toast("Digite o nome da turma", "err"); return; }
      if (ti == null) state.turmas.push({ id: uid(), nome: nome, cor: cor, links: [] });
      else { state.turmas[ti].nome = nome; state.turmas[ti].cor = cor; }
      persist(); closeModal(); render();
    }
    function delTurma(ti) {
      if (!confirm('Remover a turma "' + state.turmas[ti].nome + '" e todos os seus links?')) return;
      state.turmas.splice(ti, 1); persist(); render();
    }

    /* Links */
    function tipoOptions(sel) {
      var s = "";
      for (var i = 0; i < TIPOS.length; i++) s += '<option value="' + TIPOS[i].valor + '"' + (TIPOS[i].valor === sel ? " selected" : "") + '>' + TIPOS[i].ico + " " + TIPOS[i].label + "</option>";
      return s;
    }
    function addLink(ti) { editLinkForm(ti, null); }
    function editLink(ti, li) { editLinkForm(ti, li); }
    function editLinkForm(ti, li) {
      var l = li == null ? { titulo: "", url: "", tipo: "aula" } : state.turmas[ti].links[li];
      openModal(
        "<h3>" + (li == null ? "Adicionar link" : "Editar link") + "</h3>" +
        '<div class="field"><label>Título</label><input id="mLt" value="' + esc(l.titulo) + '" placeholder="Ex: Aula 1 — Introdução"></div>' +
        '<div class="field"><label>Endereço (URL)</label><input id="mLu" value="' + esc(l.url) + '" placeholder="https://..."></div>' +
        '<div class="field"><label>Tipo</label><select id="mLtipo">' + tipoOptions(l.tipo || "aula") + '</select></div>' +
        '<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveLink(' + ti + ',' + (li == null ? "null" : li) + ')">Salvar</button></div>'
      );
      setTimeout(function () { var e = document.getElementById("mLt"); if (e) e.focus(); }, 50);
    }
    function normalizaUrl(u) {
      u = u.replace(/^\s+|\s+$/g, "");
      if (!u) return "";
      if (!/^https?:\/\//i.test(u) && !/^[\w.-]+\.html?/i.test(u) && u.charAt(0) !== "/" && u.charAt(0) !== "#") {
        if (/\.[a-z]{2,}/i.test(u)) u = "https://" + u;
      }
      return u;
    }
    function saveLink(ti, li) {
      var titulo = document.getElementById("mLt").value.replace(/^\s+|\s+$/g, "");
      var url = normalizaUrl(document.getElementById("mLu").value);
      var tipo = document.getElementById("mLtipo").value;
      if (!titulo || !url) { toast("Preencha título e URL", "err"); return; }
      if (li == null) state.turmas[ti].links.push({ id: uid(), titulo: titulo, url: url, tipo: tipo });
      else { var l = state.turmas[ti].links[li]; l.titulo = titulo; l.url = url; l.tipo = tipo; }
      persist(); closeModal(); render();
    }
    function delLink(ti, li) {
      if (!confirm('Remover o link "' + state.turmas[ti].links[li].titulo + '"?')) return;
      state.turmas[ti].links.splice(li, 1); persist(); render();
    }

    /* Vários links de uma vez */
    function addVariosLinks(ti) {
      openModal(
        "<h3>Adicionar vários links</h3>" +
        '<div class="field"><label>Cole um link por linha</label>' +
        '<textarea id="mBulk" placeholder="Aula 1 | https://exemplo.com/aula1&#10;Atividade sobre o solo | o-solo.html&#10;https://youtube.com/..."></textarea>' +
        '<div class="hint">Formato: <b>Título | URL</b> (um por linha). Se colar só a URL, ela vira o título.</div></div>' +
        '<div class="field"><label>Tipo aplicado a todos</label><select id="mBulkTipo">' + tipoOptions("aula") + '</select></div>' +
        '<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveBulk(' + ti + ')">Adicionar</button></div>'
      );
    }
    function saveBulk(ti) {
      var tipo = document.getElementById("mBulkTipo").value;
      var linhas = document.getElementById("mBulk").value.split("\n");
      var n = 0;
      for (var i = 0; i < linhas.length; i++) {
        var linha = linhas[i].replace(/^\s+|\s+$/g, "");
        if (!linha) continue;
        var titulo, url;
        if (linha.indexOf("|") >= 0) {
          var p = linha.split("|");
          titulo = p[0].replace(/^\s+|\s+$/g, "");
          url = normalizaUrl(p.slice(1).join("|"));
        } else { url = normalizaUrl(linha); titulo = url; }
        if (url) { state.turmas[ti].links.push({ id: uid(), titulo: titulo || url, url: url, tipo: tipo }); n++; }
      }
      persist(); closeModal(); render();
      toast(n + " link(s) adicionado(s)");
    }

    /* Publicar */
    function publicar() {
      var limpo = { titulo: state.titulo, subtitulo: state.subtitulo, turmas: [] };
      for (var i = 0; i < state.turmas.length; i++) {
        var t = state.turmas[i], nl = [];
        for (var j = 0; j < (t.links || []).length; j++) {
          var l = t.links[j];
          nl.push({ id: l.id, titulo: l.titulo, url: l.url, tipo: l.tipo });
        }
        limpo.turmas.push({ id: t.id, nome: t.nome, cor: t.cor, links: nl });
      }
      var blob = new Blob([JSON.stringify(limpo, null, 2)], { type: "application/json" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "data.json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      openModal(
        "<h3>✅ Arquivo data.json gerado!</h3>" +
        "<p>Para os alunos verem as mudanças, envie este arquivo <b>data.json</b> para o GitHub:</p>" +
        '<ol style="padding-left:20px;line-height:1.9;">' +
        "<li>Abra seu repositório no GitHub.</li>" +
        "<li>Clique no arquivo <b>data.json</b> e no lápis (✏️ Edit).</li>" +
        "<li>Cole o novo conteúdo, <b>ou</b> use <b>Add file → Upload files</b> e arraste o arquivo baixado.</li>" +
        "<li>Clique em <b>Commit changes</b>. Pronto! 🎉</li>" +
        "</ol>" +
        '<div class="modal-actions"><button class="btn" onclick="closeModal()">Entendi</button></div>'
      );
    }

    /* Modal */
    function openModal(html) { document.getElementById("modal").innerHTML = html; document.getElementById("overlay").className = "overlay show"; }
    function closeModal() { document.getElementById("overlay").className = "overlay"; }
    document.getElementById("overlay").onclick = function (e) { if (e.target.id === "overlay") closeModal(); };
    document.onkeydown = function (e) { if (e.key === "Escape" || e.keyCode === 27) closeModal(); };

    carregar();
  </script>
</body>
</html>
